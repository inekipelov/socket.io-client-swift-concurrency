name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show Swift version
        run: swift --version

      - name: Install integration server dependencies
        run: npm install --prefix Tests/IntegrationServer

      - name: Run tests
        run: RUN_INTEGRATION_TESTS=1 swift test --no-parallel
